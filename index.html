<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valid Soul · Identidad digital</title>

  <!-- Video.js (para reproducir .m3u8) -->
  <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- Video de fondo --- */
    #video-fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.6;
    }

    /* --- Capa oscura --- */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      z-index: 1;
    }

    /* --- Contenido principal --- */
    .contenido {
      position: relative;
      z-index: 2;
      max-width: 780px;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 2s ease-out;
    }

    .contenido .sello {
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #6a8cff;
      margin-bottom: 1.5rem;
      border: 1px solid #2a2a2a;
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
    }

    .contenido h1 {
      font-size: 3.4rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .contenido h1 .destacado {
      font-weight: 600;
      color: #ffffff;
    }

    .contenido .subtitulo {
      font-size: 1.1rem;
      color: #a0a0a0;
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }

    .contenido .linea {
      width: 60px;
      height: 1px;
      background: #6a8cff;
      margin: 2rem auto 1.5rem;
    }

    /* --- Demo --- */
    .demo {
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(6px);
    }

    .demo .campos {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .demo input {
      background: #141414;
      border: 1px solid #2a2a2a;
      color: #f0f0f0;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      width: 200px;
      transition: border 0.2s;
    }

    .demo input:focus {
      border-color: #6a8cff;
      outline: none;
    }

    .demo button {
      background: #6a8cff;
      color: #0a0a0a;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .demo button:hover {
      background: #8aa8ff;
    }

    /* --- Resultado --- */
    #resultado {
      margin-top: 1.5rem;
      background: #0f0f0f;
      border-radius: 12px;
      padding: 1.2rem;
      font-size: 0.9rem;
      text-align: left;
      color: #c0c0c0;
      border: 1px solid #1e1e1e;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #resultado.visible {
      display: block;
      animation: fadeIn 0.6s ease-out;
    }

    /* --- Pie --- */
    .pie {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #4a4a4a;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .contenido h1 {
        font-size: 2.2rem;
      }
      .demo input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Video de fondo (.m3u8) -->
  <video id="video-fondo" muted autoplay loop playsinline>
    <source src="https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8" type="application/x-mpegURL" />
  </video>

  <!-- Capa oscura -->
  <div class="overlay"></div>

  <!-- Contenido -->
  <div class="contenido">

    <div class="sello">✦ VALID SOUL</div>

    <h1>
      Ha llegado el momento<br />
      <span class="destacado">de tener identidad.</span>
    </h1>

    <div class="linea"></div>

    <div class="demo">
      <div class="campos">
        <input type="text" id="placa" placeholder="Placa (ej: CZM919)" />
        <input type="text" id="cedula" placeholder="Cédula (ej: 11007604102)" />
        <button id="verificarBtn">Verificar</button>
      </div>

      <div id="resultado"></div>
    </div>

    <div class="pie">
      ¿Eres un agente autónomo? Únete al ecosistema.
    </div>

  </div>

  <script>
    // Esperar a que el DOM esté listo
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('verificarBtn');
      const placaInput = document.getElementById('placa');
      const cedulaInput = document.getElementById('cedula');
      const resultadoDiv = document.getElementById('resultado');

      btn.addEventListener('click', async function() {
        const plate = placaInput.value.trim().toUpperCase();
        const documentNumber = cedulaInput.value.trim();

        if (!plate || !documentNumber) {
          resultadoDiv.textContent = '⚠️ Por favor, ingresa placa y cédula.';
          resultadoDiv.classList.add('visible');
          return;
        }

        resultadoDiv.textContent = '⏳ Consultando Valid Soul...';
        resultadoDiv.classList.add('visible');

        try {
          const response = await fetch(
            'https://bzejstotdvsalpiqywbj.supabase.co/functions/v1/mcp',
            {
              method: 'POST',
              headers: {
                'x-valid-key': 'VALID-TEST-123',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                jsonrpc: '2.0',
                id: 1,
                method: 'tools/call',
                params: {
                  name: 'verify_vehicle',
                  arguments: {
                    plate: plate,
                    documentType: 'CC',
                    documentNumber: documentNumber
                  }
                }
              })
            }
          );

          const data = await response.json();
          const text = data?.result?.content?.[0]?.text;

          if (!text) {
            resultadoDiv.textContent = '❌ No se obtuvo respuesta de Valid Soul.';
            return;
          }

          const parsed = JSON.parse(text);

          if (parsed.error) {
            resultadoDiv.textContent = `❌ ${parsed.error}`;
            return;
          }

          // Formatear respuesta bonita
          const lines = [
            `✅ SOUL VERIFICADO`,
            `Soul ID: ${parsed.valid_id || 'N/A'}`,
            `VIN: ${parsed.vin || 'N/A'}`,
            `Marca: ${parsed.vehiculo?.marca || 'N/A'}`,
            `Modelo: ${parsed.vehiculo?.modelo || 'N/A'}`,
            `Año: ${parsed.vehiculo?.ano || 'N/A'}`,
            `Color: ${parsed.vehiculo?.color || 'N/A'}`,
            `SOAT: ${parsed.estado_legal?.soat_vigente ? '✅ Vigente' : '❌ No vigente'}`,
            `Multas: ${parsed.estado_legal?.multas || 0}`,
            `Firma: ${parsed.firma?.signature?.substring(0, 20) || 'N/A'}...`
          ];

          resultadoDiv.textContent = lines.join('\n');
        } catch (error) {
          resultadoDiv.textContent = `❌ Error: ${error.message}`;
        }
      });
    });
  </script>

</body>
</html>
